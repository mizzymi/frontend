<article class="product-card">
  <a [routerLink]="['/product', product._id]" class="image-link">
    <img
      [src]="product.images?.[0] || 'https://placehold.co/700x700?text=REIMII+3D'"
      [alt]="product.name"
    />
  </a>

  <div class="content">
    <h3>
      <a [routerLink]="['/product', product._id]">
        {{ product.name }}
      </a>
    </h3>

    <p class="small">{{ product.description }}</p>

    <div class="bottom">
      <strong>{{ product.price | currency: 'EUR' }}</strong>

      <div class="rating" *ngIf="product.ratingCount > 0">
        <span class="stars">★ {{ product.ratingAverage | number: '1.1-1' }}</span>
        <span class="reviews">({{ formatReviews(product.ratingCount) }})</span>
      </div>
    </div>
  </div>
</article>
